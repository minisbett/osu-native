name: Test

on:
  pull_request:
    branches:
      - main
      
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run Tests
        run: dotnet test -c Release